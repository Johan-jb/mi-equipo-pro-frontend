<!DOCTYPE html>
<html>
<head>
    <title>Verificar conexión</title>
</head>
<body>
    <h2>Prueba de conexión con el backend</h2>
    <button onclick="probarLogin()">Probar Login</button>
    <pre id="resultado"></pre>

    <script>
        async function probarLogin() {
            const resultado = document.getElementById('resultado');
            resultado.textContent = 'Cargando...';
            
            try {
                const response = await fetch('https://sportmetrics-api.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'prueba@test.com', password: '123456' })
                });
                
                const data = await response.json();
                resultado.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultado.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
